name: Build and Deploy Research Universe UI

on:
  push:
    branches: [main]
    paths:
      - 'research-universe-ui/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build
        working-directory: research-universe-ui
        run: npm ci && npm run build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-north-1
      - name: Sync to S3
        run: aws s3 sync research-universe-ui/dist/ s3://${{ secrets.RESEARCH_UNIVERSE_UI_BUCKET }} --delete
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.RESEARCH_UNIVERSE_UI_CLOUDFRONT_ID }} \
            --paths "/*"
