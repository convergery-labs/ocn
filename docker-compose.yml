services:

  # ---------------------------------------------------------------------------
  # auth-service (port 8001)
  # ---------------------------------------------------------------------------
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
      target: base
    ports:
      - "8001:8001"
    env_file: auth-service/.env
    depends_on:
      postgres-auth:
        condition: service_healthy
    networks:
      - ocn-internal

  postgres-auth:
    image: postgres:16
    env_file: auth-service/.env
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ocn-internal

  # ---------------------------------------------------------------------------
  # news-retrieval (port 8000)
  # ---------------------------------------------------------------------------
  news-retrieval:
    build:
      context: .
      dockerfile: news-retrieval/Dockerfile
      target: base
    ports:
      - "8000:8000"
    env_file: news-retrieval/.env
    depends_on:
      postgres-news:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - ocn-internal

  postgres-news:
    image: postgres:16
    env_file: news-retrieval/.env
    volumes:
      - postgres-news-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ocn-internal

  # ---------------------------------------------------------------------------
  # api-gateway (port 8004)
  # ---------------------------------------------------------------------------
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
      target: base
    ports:
      - "8004:8004"
    env_file: api-gateway/.env
    depends_on:
      auth-service:
        condition: service_started
      news-retrieval:
        condition: service_started
      signal-detection:
        condition: service_started
    networks:
      - ocn-internal

  # ---------------------------------------------------------------------------
  # ocn-agent (port 8003)
  # ---------------------------------------------------------------------------
  ocn-agent:
    build:
      context: .
      dockerfile: ocn-agent/Dockerfile
      target: base
    ports:
      - "8003:8003"
    env_file: ocn-agent/.env
    depends_on:
      news-retrieval:
        condition: service_started
    networks:
      - ocn-internal

  postgres-auth-test:
    image: postgres:16
    ports:
      - "5434:5432"
    env_file: auth-service/.env
    networks:
      - ocn-internal

  postgres-news-test:
    image: postgres:16
    ports:
      - "5433:5432"
    env_file: news-retrieval/.env
    environment:
      POSTGRES_DB: news-retrieval-test
    networks:
      - ocn-internal

  postgres-signal-test:
    image: postgres:16
    ports:
      - "5435:5432"
    env_file: signal-detection/.env
    networks:
      - ocn-internal

  # ---------------------------------------------------------------------------
  # signal-detection (port 8002)
  # ---------------------------------------------------------------------------
  signal-detection:
    build:
      context: .
      dockerfile: signal-detection/Dockerfile
      target: base
    ports:
      - "8002:8002"
    env_file: signal-detection/.env
    depends_on:
      postgres-signal:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - ocn-internal

  postgres-signal:
    image: postgres:16
    env_file: signal-detection/.env
    volumes:
      - postgres-signal-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ocn-internal

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ocn-internal

networks:
  ocn-internal:
    driver: bridge

volumes:
  postgres-auth-data:
  postgres-news-data:
  postgres-signal-data:
  qdrant-data:
